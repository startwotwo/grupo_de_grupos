networks:
  videoconf:
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Registry + Cluster de Brokers
#
# IMPORTANTE: BROKER_ADVERTISE_HOST deve ser o IP real da sua máquina na rede
# local.
#
# Para descobrir seu IP:
#   ip route get 1 | awk '{print $7; exit}'   # Linux
#
# Subir infra:
#   docker compose up --build registry broker-1 broker-2 broker-3
#
# Abrir clientes (em terminais separados, fora do Docker):
#   ./run_client.sh --id Nome1 --room A
#   ./run_client.sh --id Nome2   --room A
#
# Demonstração de failover (derruba broker-1, cliente reconecta):
#   docker compose stop broker-1
#   (heartbeat detecta e reconecta para broker-2 ou broker-3)
#
# Portas:
#   registry : 5550
#   broker-1 : 5555-5559  (+0 XSUB, +1 XPUB, +2 ROUTER, +3 PUB, +4 SUB)
#   broker-2 : 5565-5569
#   broker-3 : 5575-5579
# ─────────────────────────────────────────────────────────────────────────────

# ── IP da máquina host (acessível pelos clientes) ─────────────────────────────
# Detecção automática: export HOST_IP=$(ip route get 1 | awk '{print $7; exit}')
# Ou defina manualmente:  export HOST_IP=192.168.1.100
# Se HOST_IP não estiver definido, usa 127.0.0.1 (somente localhost).
x-broker-host: &broker-host
  BROKER_ADVERTISE_HOST: "${HOST_IP:-127.0.0.1}"

services:

  # ── Registry ────────────────────────────────────────────────────────────────
  registry:
    build:
      context: .
      dockerfile: registry/Dockerfile
    container_name: registry
    hostname: registry
    networks:
      - videoconf
    ports:
      - "5550:5550"
    environment:
      REGISTRY_PORT:     "5550"
      BROKER_HOST:       "0.0.0.0"
      HEARTBEAT_TIMEOUT: "8.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import zmq,msgpack;c=zmq.Context();s=c.socket(zmq.REQ);s.setsockopt(zmq.RCVTIMEO,2000);s.setsockopt(zmq.LINGER,0);s.connect('tcp://localhost:5550');s.send(msgpack.packb({'v':1,'id':'hc','type':'control','from':'hc','room':'_','ts':0,'data':{'action':'list_brokers'}},use_bin_type=True));s.recv()\""]
      interval:     5s
      timeout:      4s
      retries:      10
      start_period: 10s

  # ── Broker 1 ────────────────────────────────────────────────────────────────
  broker-1:
    build:
      context: .
      dockerfile: broker/Dockerfile
    container_name: broker-1
    hostname: broker-1
    networks:
      - videoconf
    ports:
      - "5555:5555"
      - "5556:5556"
      - "5557:5557"
      - "5558:5558"
      - "5559:5559"
    environment:
      <<: *broker-host
      BROKER_ID:           "broker-1"
      BROKER_BASE_PORT:    "5555"
      BROKER_CLUSTER_HOST: "broker-1"
      REGISTRY_HOST:       "registry"
      REGISTRY_PORT:       "5550"
      HEARTBEAT_INTERVAL:  "2.0"
      HEARTBEAT_TIMEOUT:   "8.0"
    depends_on:
      registry:
        condition: service_healthy
    restart: unless-stopped

  # ── Broker 2 ────────────────────────────────────────────────────────────────
  broker-2:
    build:
      context: .
      dockerfile: broker/Dockerfile
    container_name: broker-2
    hostname: broker-2
    networks:
      - videoconf
    ports:
      - "5565:5565"
      - "5566:5566"
      - "5567:5567"
      - "5568:5568"
      - "5569:5569"
    environment:
      <<: *broker-host
      BROKER_ID:           "broker-2"
      BROKER_BASE_PORT:    "5565"
      BROKER_CLUSTER_HOST: "broker-2"
      REGISTRY_HOST:       "registry"
      REGISTRY_PORT:       "5550"
      HEARTBEAT_INTERVAL:  "2.0"
      HEARTBEAT_TIMEOUT:   "8.0"
    depends_on:
      registry:
        condition: service_healthy
    restart: unless-stopped

  # ── Broker 3 ────────────────────────────────────────────────────────────────
  broker-3:
    build:
      context: .
      dockerfile: broker/Dockerfile
    container_name: broker-3
    hostname: broker-3
    networks:
      - videoconf
    ports:
      - "5575:5575"
      - "5576:5576"
      - "5577:5577"
      - "5578:5578"
      - "5579:5579"
    environment:
      <<: *broker-host
      BROKER_ID:           "broker-3"
      BROKER_BASE_PORT:    "5575"
      BROKER_CLUSTER_HOST: "broker-3"
      REGISTRY_HOST:       "registry"
      REGISTRY_PORT:       "5550"
      HEARTBEAT_INTERVAL:  "2.0"
      HEARTBEAT_TIMEOUT:   "8.0"
    depends_on:
      registry:
        condition: service_healthy
    restart: unless-stopped