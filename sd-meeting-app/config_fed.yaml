    max_retry: 5
    retry_interval: 0.2
    ack_timeout: 2.0
  audio:
    max_queue_depth: 10
  video:
    max_queue_depth: 3
    base_fps: 15
    min_fps: 5
    jpeg_quality: 70
    min_jpeg_quality: 30
