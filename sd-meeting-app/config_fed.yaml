broker:
  text:
    pub_port: 7501
    pull_port: 7502
  audio:
    pub_port: 7503
    pull_port: 7504
  video:
    pub_port: 7505
    pull_port: 7506
  control_port: 7510
  inter_broker_base_port: 7520
  heartbeat_base_port: 7530
  port_stride: 100

registry:
  listen_host: 0.0.0.0
  host: 127.0.0.1
  port: 7500
  heartbeat_timeout: 5.0

cluster:
  heartbeat_interval: 2.0
  heartbeat_timeout: 5.0
  all_rooms: [A, B, C, D, E, F, G, H, I, J, K]
